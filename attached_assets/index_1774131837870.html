<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>الرياض تنافس - تدريبات على اختبارات نافس</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Cairo',sans-serif;
  background:linear-gradient(135deg,#0a0515,#1a0a2e,#0f1a2e);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;
}
.stars{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) var(--delay,0s) infinite;}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:1}}

.content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:100%;max-width:760px;}

.logo-area{text-align:center;margin-bottom:40px;}
.trophy{font-size:4.5rem;animation:float 3.5s ease-in-out infinite;display:block;margin-bottom:12px;}
@keyframes float{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
.site-name{
  font-size:2.8rem;font-weight:900;
  background:linear-gradient(135deg,#74b9ff,#a29bfe,#fd79a8,#fdcb6e);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1.1;margin-bottom:6px;
}
.site-tagline{
  color:rgba(255,255,255,.6);font-size:.95rem;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.12);
  border-radius:30px;padding:6px 20px;display:inline-block;
}

.cards{display:grid;grid-template-columns:1fr 1fr;gap:22px;width:100%;}

.card{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);
  border-radius:22px;padding:28px 22px;
  text-align:center;text-decoration:none;color:#fff;
  transition:all .3s;backdrop-filter:blur(12px);
  position:relative;overflow:hidden;
}
.card::after{
  content:'';position:absolute;inset:0;opacity:0;transition:.3s;border-radius:22px;
  background:var(--glow);
}
.card:hover{transform:translateY(-8px);border-color:rgba(255,255,255,.25);}
.card:hover::after{opacity:1;}
.card.g3{--glow:linear-gradient(135deg,rgba(30,79,160,.3),rgba(46,134,193,.25));}
.card.g6{--glow:linear-gradient(135deg,rgba(74,35,90,.3),rgba(125,60,152,.25));}

.card-icon{font-size:2.6rem;display:block;margin-bottom:10px;position:relative;z-index:1;}
.card-grade{font-size:1.2rem;font-weight:900;margin-bottom:8px;position:relative;z-index:1;}
.card.g3 .card-grade{color:#74b9ff;}
.card.g6 .card-grade{color:#c39bff;}

.badges{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;position:relative;z-index:1;}
.badge{padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;}
.g3 .badge{background:rgba(116,185,255,.18);color:#74b9ff;border:1px solid rgba(116,185,255,.28);}
.g6 .badge{background:rgba(195,155,255,.18);color:#c39bff;border:1px solid rgba(195,155,255,.28);}

.stats{color:rgba(255,255,255,.45);font-size:.76rem;margin-bottom:18px;position:relative;z-index:1;}

.open{
  display:inline-block;padding:9px 22px;border-radius:11px;
  font-family:'Cairo',sans-serif;font-weight:800;font-size:.9rem;
  text-decoration:none;transition:.2s;position:relative;z-index:1;
}
.g3 .open{background:linear-gradient(135deg,#1B4F72,#2E86C1);color:#fff;box-shadow:0 4px 14px rgba(46,134,193,.4);}
.g6 .open{background:linear-gradient(135deg,#4A235A,#7D3C98);color:#fff;box-shadow:0 4px 14px rgba(125,60,152,.4);}
.open:hover{transform:scale(1.06);}

@media(max-width:580px){
  .cards{grid-template-columns:1fr;}
  .site-name{font-size:2rem;}
}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="content">
  <div class="logo-area">
    <span class="trophy">🏆</span>
    <div class="site-name">الرياض تنافس</div>
    <div class="site-tagline">تدريبات على اختبارات نافس</div>
  </div>

  <div class="cards">
    <a class="card g3" href="grade3_app.html">
      <span class="card-icon">✏️</span>
      <div class="card-grade">الصف الثالث الابتدائي</div>
      <div class="badges">
        <span class="badge">📖 القراءة</span>
        <span class="badge">🔢 الرياضيات</span>
      </div>
      <div class="stats">67 صفحة · 255 إجابة مضمّنة · إخفاء/إظهار</div>
      <span class="open">ابدأ التدريب ←</span>
    </a>

    <a class="card g6" href="grade6_app.html">
      <span class="card-icon">🎓</span>
      <div class="card-grade">الصف السادس الابتدائي</div>
      <div class="badges">
        <span class="badge">🔢 الرياضيات</span>
        <span class="badge">🔬 العلوم</span>
        <span class="badge">📖 القراءة</span>
      </div>
      <div class="stats">200 صفحة · مفتاح الإجابات منفصل · إخفاء/إظهار</div>
      <span class="open">ابدأ التدريب ←</span>
    </a>
  </div>
</div>

<script>
// Generate stars
const s=document.getElementById('stars');
for(let i=0;i<120;i++){
  const d=document.createElement('div');
  d.className='star';
  d.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s;opacity:${Math.random()*.8};width:${Math.random()<.2?3:2}px;height:${Math.random()<.2?3:2}px`;
  s.appendChild(d);
}
</script>
</body>
</html>
